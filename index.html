<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./stylesheet.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <title>Social links profile</title>
</head>
<body>
  <main class="container">
    <article class="box">
      <img src="./assets/images/avatar-jessica.jpeg" alt="jessica randall photo">

      <div class="name_place">
        <h2 class="name">Jessica Randall</h2>
        <p class="place">London, United Kingdom</p>
      </div>

      <p class="description">"Front-end developer and avid reader."</p>
      
      <section class="links">
        <ul>
          <li><a href="#">Github</a></li>
          <li><a href="#">Frontend Mentor</a></li>
          <li><a href="#">Linkedin</a></li>
          <li><a href="#">Twitter</a></li>
          <li><a href="#">Instagram</a></li>
        </ul>
      </section>
    </article>
  </main>
</body>
</html>
